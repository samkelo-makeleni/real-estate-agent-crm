name: real_estate_agent_crm
description: "A BGN Real Estate inspired Flutter CRM and property listing app."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  cloud_functions: ^6.3.3
  google_sign_in: ^7.2.0
  provider: ^6.1.5+1
  go_router: ^17.3.0
  image_picker: ^1.2.2
  file_picker: ^12.0.0-beta.1
  intl: ^0.20.3
  table_calendar: ^3.2.0
  uuid: ^4.5.3
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  flutter_local_notifications: ^22.0.1
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.2.0
  permission_handler: ^12.0.3
  geolocator: ^14.0.3
  google_maps_flutter: ^2.17.1
  carousel_slider: ^5.1.2
  fl_chart: ^1.2.0
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0




flutter:

  uses-material-design: true
  assets:
    - assets/images/

  
